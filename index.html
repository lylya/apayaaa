<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Untuk Kamuu 💖</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				background: linear-gradient(135deg, #ff9a9e, #fecfef);
				font-family: "Poppins", sans-serif;
				text-align: center;
				color: white;
			}

			.container {
				padding: 20px;
			}

			h1 {
				font-family: "Pacifico", cursive;
				font-size: 8vw;
				margin-bottom: 10px;
			}

			.heart {
				font-size: 15vw;
				animation: beat 1s infinite;
			}

			@keyframes beat {
				0% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.2);
				}
				100% {
					transform: scale(1);
				}
			}

			p {
				font-size: 4vw;
				opacity: 0.9;
			}

			button {
				margin-top: 20px;
				padding: 12px 25px;
				border: none;
				border-radius: 30px;
				background: white;
				color: #ff6b81;
				font-size: 4vw;
				font-weight: bold;
				cursor: pointer;
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
			}

			button:hover {
				transform: scale(1.05);
			}

			#message {
				display: none;
				margin-top: 20px;
			}

			#photo {
				margin-top: 20px;
				display: none;
				opacity: 0;
				transform: translateY(20px);
				transition: 0.8s;
			}

			#photo.show {
				display: block;
				opacity: 1;
				transform: translateY(0);
			}

			#photo img {
				width: 70%;
				max-width: 250px;
				border-radius: 20px;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>Hai Sayang 💕</h1>
			<div class="heart">❤️</div>

			<p>Tau gakkkk...</p>

			<button onclick="showAll()">Klik di sini 💌</button>

			<div id="message">
				<p>Kamu itu dunia aku 💖</p>
				<p>Makasih udah selalu ada 🥺</p>
				<p>I love you 💕</p>
			</div>

			<div id="photo">
				<img src="us.jpeg" />
			</div>
		</div>

		<audio id="bgMusic" loop>
			<source src="lagu.mp3" type="audio/mpeg" />
		</audio>

		<script>
			const music = document.getElementById("bgMusic");

			function showAll() {
				document.getElementById("message").style.display = "block";
				document.getElementById("photo").classList.add("show");
				music.play();
			}
		</script>
	</body>
</html>
