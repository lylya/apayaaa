<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Untuk Kamu 💖</title>

		<style>
			body {
				background: linear-gradient(135deg, #ff9a9e, #fad0c4);
				font-family: "Comic Sans MS", cursive;
				text-align: center;
				padding: 20px;
				color: #fff;
			}

			h1 {
				font-size: 8vw;
			}

			p {
				font-size: 4vw;
			}

			.heart {
				font-size: 12vw;
				animation: beat 1s infinite;
			}

			@keyframes beat {
				0% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.3);
				}
				100% {
					transform: scale(1);
				}
			}

			button {
				padding: 12px 20px;
				border: none;
				border-radius: 20px;
				background: #ff6b81;
				color: white;
				font-size: 4vw;
				cursor: pointer;
				margin-top: 20px;
			}

			#message {
				margin-top: 20px;
				display: none;
			}

			#photo {
				margin-top: 20px;
				display: none;
				opacity: 0;
				transform: scale(0.8);
				transition: all 0.8s ease;
			}

			#photo img {
				width: 80%;
				max-width: 300px;
				border-radius: 20px;
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
			}

			#photo.show {
				display: block;
				opacity: 1;
				transform: scale(1);
			}
		</style>
	</head>

	<body>
		<h1>Hai Sayangggg 💕</h1>
		<div class="heart">❤️</div>

		<p>Tau gakkkkk...</p>

		<button onclick="showAll()">Klik di sini 💌</button>

		<div id="message">
			<p>Kamu itu spesial banget buat aku 💖</p>
			<p>Makasih ya udah ada di hidup aku 🥺</p>
			<p>I love you 💕</p>
			<p>Mau tiummmmmm xixi</p>
		</div>

		<div id="photo">
			<img src="us.jpg" alt="Foto Kita" />
		</div>

		<audio id="bgMusic" loop>
			<source src="lagu.mp3" type="audio/mpeg" />
		</audio>

		<script>
			const music = document.getElementById("bgMusic");

			function showAll() {
				document.getElementById("message").style.display = "block";
				document.getElementById("photo").classList.add("show");
				music.play();
			}
		</script>
	</body>
</html>
